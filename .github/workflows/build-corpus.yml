name: Build Apple Docs Corpus

on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch:
    inputs:
      frameworks:
        description: 'Space-separated framework slugs (blank = auto-discover all)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 720
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt
          sudo apt-get update -y && sudo apt-get install -y zstd jq

      - name: Build corpus (single streaming pass)
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          if [ -n "${{ github.event.inputs.frameworks }}" ]; then
            python -u scripts/build_corpus.py --out-dir dist --frameworks ${{ github.event.inputs.frameworks }}
          else
            python -u scripts/build_corpus.py --out-dir dist
          fi

      - name: Compress release artifacts
        run: |
          zstd -19 -f dist/index.db -o dist/index.db.zst
          for fw in dist/markdown/*/; do
            name=$(basename "$fw")
            tar -cf - -C dist/markdown "$name" | zstd -19 -o "dist/sherlock-$name.tar.zst"
          done
          ls -lh dist/

      - name: Compute release metadata
        id: meta
        run: |
          DATE=$(date -u +%Y-%m-%d)
          echo "date=$DATE" >> $GITHUB_OUTPUT
          PAGES=$(jq -r '.total_pages' dist/manifest.json)
          FW_COUNT=$(jq -r '.frameworks | length' dist/manifest.json)
          {
            echo "Apple Developer documentation snapshot built ${DATE}."
            echo ""
            echo "- **${PAGES} pages** indexed across **${FW_COUNT} frameworks**"
            echo "- Frameworks: $(jq -r '.frameworks | join(", ")' dist/manifest.json)"
            echo "- Build duration: $(jq -r '.duration_seconds' dist/manifest.json)s"
            echo ""
            echo "Install [Sherlock](https://github.com/hotfix-jobs/sherlock) and call \`update_index\` to fetch this release."
          } > dist/release-notes.md

      # We upload ~370 release assets per run. GitHub's release-upload
      # endpoint has an undocumented secondary rate limit that a single
      # softprops/action-gh-release call burst-uploads right past. Instead:
      # create a draft release, upload assets one-by-one with throttling +
      # retry, then promote to published so `latest` only moves on success.
      - name: Create or reuse draft release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="corpus-${{ steps.meta.outputs.date }}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists; reusing"
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" \
              --draft \
              --notes-file dist/release-notes.md
          else
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
              --title "Apple Docs Corpus ${{ steps.meta.outputs.date }}" \
              --notes-file dist/release-notes.md \
              --draft
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Upload release assets (throttled)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          # Pause between individual uploads (seconds).
          INTER_UPLOAD_SLEEP: "2"
          # Every BATCH uploads, sleep BATCH_SLEEP for cooldown.
          BATCH: "50"
          BATCH_SLEEP: "60"
          # Per-asset retry on transient failures (e.g., secondary rate limit).
          MAX_RETRIES: "6"
        run: |
          set -euo pipefail
          shopt -s nullglob

          ASSETS=(dist/index.db.zst dist/manifest.json dist/sherlock-*.tar.zst)
          TOTAL=${#ASSETS[@]}
          echo "Uploading $TOTAL assets to $TAG"

          upload_one() {
            local file="$1"
            local attempt=1
            local backoff=15
            while true; do
              if gh release upload "$TAG" "$file" \
                  --repo "$GITHUB_REPOSITORY" --clobber; then
                return 0
              fi
              if [ "$attempt" -ge "$MAX_RETRIES" ]; then
                echo "::error::Failed to upload $file after $attempt attempts"
                return 1
              fi
              echo "Upload of $file failed (attempt $attempt). Sleeping ${backoff}s..."
              sleep "$backoff"
              attempt=$((attempt + 1))
              backoff=$((backoff * 2))
            done
          }

          count=0
          for f in "${ASSETS[@]}"; do
            upload_one "$f"
            count=$((count + 1))
            if [ "$count" -lt "$TOTAL" ]; then
              if [ $((count % BATCH)) -eq 0 ]; then
                echo "Uploaded $count/$TOTAL — cooling down ${BATCH_SLEEP}s"
                sleep "$BATCH_SLEEP"
              else
                sleep "$INTER_UPLOAD_SLEEP"
              fi
            fi
          done
          echo "Uploaded $count/$TOTAL assets"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false --latest
