name: Build Apple Docs Corpus

on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch:
    inputs:
      frameworks:
        description: 'Space-separated framework slugs (blank = auto-discover all)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 720
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt
          sudo apt-get update -y && sudo apt-get install -y zstd jq

      - name: Build corpus (single streaming pass)
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          if [ -n "${{ github.event.inputs.frameworks }}" ]; then
            python -u scripts/build_corpus.py --out-dir dist --frameworks ${{ github.event.inputs.frameworks }}
          else
            python -u scripts/build_corpus.py --out-dir dist
          fi

      - name: Compress release artifacts
        run: |
          zstd -19 -f dist/index.db -o dist/index.db.zst
          for fw in dist/markdown/*/; do
            name=$(basename "$fw")
            tar -cf - -C dist/markdown "$name" | zstd -19 -o "dist/sherlock-$name.tar.zst"
          done
          ls -lh dist/

      - name: Compute release metadata
        id: meta
        run: |
          DATE=$(date -u +%Y-%m-%d)
          echo "date=$DATE" >> $GITHUB_OUTPUT
          PAGES=$(jq -r '.total_pages' dist/manifest.json)
          FW_COUNT=$(jq -r '.frameworks | length' dist/manifest.json)
          {
            echo "Apple Developer documentation snapshot built ${DATE}."
            echo ""
            echo "- **${PAGES} pages** indexed across **${FW_COUNT} frameworks**"
            echo "- Frameworks: $(jq -r '.frameworks | join(", ")' dist/manifest.json)"
            echo "- Build duration: $(jq -r '.duration_seconds' dist/manifest.json)s"
            echo ""
            echo "Install [Sherlock](https://github.com/hotfix-jobs/sherlock) and call \`update_index\` to fetch this release."
          } > dist/release-notes.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: corpus-${{ steps.meta.outputs.date }}
          name: Apple Docs Corpus ${{ steps.meta.outputs.date }}
          body_path: dist/release-notes.md
          files: |
            dist/index.db.zst
            dist/manifest.json
            dist/sherlock-*.tar.zst
